version: '3.8'
services:
  app:
    build: .
    container_name: petfoster_app
    ports:
      - "8084:8084"
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=petfoster
      - DB_USER=app_user
      - DB_PASSWORD=app_pass
      - JWT_SECRET=petfoster-super-secret-key-for-jwt-token-generation-123456
    volumes:
      - uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: petfoster_mysql
    environment:
      - MYSQL_ROOT_PASSWORD=root_pass
      - MYSQL_DATABASE=petfoster
      - MYSQL_USER=app_user
      - MYSQL_PASSWORD=app_pass
    ports:
      - "13309:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysql", "-uapp_user", "-papp_pass", "-e", "SELECT 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

volumes:
  mysql_data:
  uploads:
