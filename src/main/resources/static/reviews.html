<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>评价列表 - PetFoster</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 36px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header p {
            font-size: 16px;
            opacity: 0.9;
        }

        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            color: white;
            text-decoration: none;
            font-size: 14px;
            opacity: 0.9;
        }

        .back-btn:hover {
            opacity: 1;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .filter-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-group select {
            padding: 10px 15px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 14px;
            cursor: pointer;
        }

        .filter-group select option {
            color: #333;
        }

        .btn-primary {
            padding: 10px 20px;
            background: white;
            color: #667eea;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.2s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        .reviews-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .review-card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }

        .review-card:hover {
            transform: translateY(-3px);
        }

        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .reviewer-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 18px;
        }

        .reviewer-details h3 {
            font-size: 16px;
            color: #333;
            margin-bottom: 4px;
        }

        .reviewer-details p {
            font-size: 13px;
            color: #666;
        }

        .overall-score {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 25px;
            border-radius: 12px;
            text-align: center;
            min-width: 120px;
        }

        .overall-score-label {
            font-size: 12px;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .overall-score-value {
            font-size: 32px;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 3px;
        }

        .overall-score-stars {
            font-size: 16px;
            color: #fbbf24;
        }

        .rating-dimensions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
        }

        .dimension-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .dimension-label {
            font-size: 14px;
            color: #555;
            font-weight: 500;
        }

        .dimension-rating {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dimension-stars {
            color: #fbbf24;
            font-size: 16px;
        }

        .dimension-value {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            min-width: 20px;
            text-align: right;
        }

        .review-content {
            margin-bottom: 15px;
            padding: 15px;
            background: #fefce8;
            border-radius: 8px;
            border-left: 4px solid #facc15;
        }

        .review-content p {
            color: #444;
            line-height: 1.6;
            font-size: 14px;
        }

        .review-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid #eee;
            flex-wrap: wrap;
            gap: 10px;
        }

        .review-meta {
            font-size: 13px;
            color: #999;
        }

        .review-meta span {
            margin-right: 15px;
        }

        .empty-state {
            background: white;
            border-radius: 16px;
            padding: 60px 40px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .empty-state h3 {
            font-size: 20px;
            color: #333;
            margin-bottom: 10px;
        }

        .empty-state p {
            color: #666;
            margin-bottom: 25px;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .pagination button {
            padding: 8px 15px;
            border: 2px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.1);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .pagination button:hover:not(:disabled) {
            background: rgba(255,255,255,0.2);
        }

        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .pagination .page-info {
            color: white;
            font-size: 14px;
        }

        .loading {
            text-align: center;
            color: white;
            padding: 40px;
            font-size: 16px;
        }

        .stats-summary {
            background: white;
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-label {
            font-size: 13px;
            color: #666;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #667eea;
        }

        .stat-stars {
            color: #fbbf24;
            font-size: 16px;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← 返回首页</a>

        <div class="header">
            <h1>⭐ 评价列表</h1>
            <p>查看所有寄养评价，了解用户口碑</p>
        </div>

        <div class="toolbar">
            <div class="filter-group">
                <select id="sortSelect">
                    <option value="createdAt,desc">最新发布</option>
                    <option value="rating,desc">评分最高</option>
                    <option value="rating,asc">评分最低</option>
                </select>
                <select id="minRatingSelect">
                    <option value="">全部评分</option>
                    <option value="5">5星</option>
                    <option value="4">4星及以上</option>
                    <option value="3">3星及以上</option>
                </select>
            </div>
            <a href="create-review.html" class="btn-primary">+ 发布评价</a>
        </div>

        <div id="statsSummary"></div>

        <div id="reviewsContainer">
            <div class="loading">加载中...</div>
        </div>

        <div id="pagination" class="pagination" style="display: none;"></div>
    </div>

    <script src="js/common.js"></script>
    <script>
        let currentPage = 0;
        const pageSize = 10;
        let totalReviews = 0;
        let allReviews = [];

        document.addEventListener('DOMContentLoaded', function() {
            checkAuth();
            loadReviews();

            document.getElementById('sortSelect').addEventListener('change', function() {
                currentPage = 0;
                loadReviews();
            });

            document.getElementById('minRatingSelect').addEventListener('change', function() {
                currentPage = 0;
                loadReviews();
            });
        });

        function checkAuth() {
            if (!authToken) {
                window.location.href = 'index.html';
            }
        }

        function renderStars(rating) {
            return '★'.repeat(rating) + '☆'.repeat(5 - rating);
        }

        async function loadReviews() {
            const sort = document.getElementById('sortSelect').value;
            const minRating = document.getElementById('minRatingSelect').value;

            const params = {
                page: currentPage,
                size: pageSize,
                sort: sort
            };

            if (minRating) {
                params.minRating = minRating;
            }

            try {
                document.getElementById('reviewsContainer').innerHTML = '<div class="loading">加载中...</div>';

                const data = await getReviews(params);
                allReviews = data.content;
                totalReviews = data.totalElements;

                renderStatsSummary();

                if (allReviews.length === 0) {
                    document.getElementById('reviewsContainer').innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📝</div>
                            <h3>暂无评价</h3>
                            <p>还没有用户发布评价，成为第一个发布评价的人吧！</p>
                            <a href="create-review.html" class="btn-primary">发布第一条评价</a>
                        </div>
                    `;
                    document.getElementById('pagination').style.display = 'none';
                } else {
                    renderReviews();
                    renderPagination(data);
                }
            } catch (error) {
                showMessage(error.message, 'error');
                document.getElementById('reviewsContainer').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">❌</div>
                        <h3>加载失败</h3>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }

        function renderStatsSummary() {
            if (allReviews.length === 0) {
                document.getElementById('statsSummary').style.display = 'none';
                return;
            }

            const avgResponsibility = (allReviews.reduce((sum, r) => sum + r.responsibilityRating, 0) / allReviews.length).toFixed(1);
            const avgCommunication = (allReviews.reduce((sum, r) => sum + r.communicationRating, 0) / allReviews.length).toFixed(1);
            const avgPetCondition = (allReviews.reduce((sum, r) => sum + r.petConditionRating, 0) / allReviews.length).toFixed(1);
            const avgOverall = (allReviews.reduce((sum, r) => sum + r.rating, 0) / allReviews.length).toFixed(1);

            document.getElementById('statsSummary').style.display = 'grid';
            document.getElementById('statsSummary').innerHTML = `
                <div class="stat-item">
                    <div class="stat-label">综合平均分</div>
                    <div class="stat-value">${avgOverall}</div>
                    <div class="stat-stars">${renderStars(Math.round(avgOverall))}</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">责任心</div>
                    <div class="stat-value">${avgResponsibility}</div>
                    <div class="stat-stars">${renderStars(Math.round(avgResponsibility))}</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">沟通能力</div>
                    <div class="stat-value">${avgCommunication}</div>
                    <div class="stat-stars">${renderStars(Math.round(avgCommunication))}</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">宠物状态反馈</div>
                    <div class="stat-value">${avgPetCondition}</div>
                    <div class="stat-stars">${renderStars(Math.round(avgPetCondition))}</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">评价总数</div>
                    <div class="stat-value">${totalReviews}</div>
                </div>
            `;
        }

        function renderReviews() {
            const html = allReviews.map(review => {
                const contentHtml = review.content
                    ? `<div class="review-content"><p>${escapeHtml(review.content)}</p></div>`
                    : '';

                return `
                    <div class="review-card">
                        <div class="review-header">
                            <div class="reviewer-info">
                                <div class="avatar">${review.reviewerUsername ? review.reviewerUsername.charAt(0).toUpperCase() : '?'}</div>
                                <div class="reviewer-details">
                                    <h3>${escapeHtml(review.reviewerUsername || '匿名用户')}</h3>
                                    <p>评价了 ${escapeHtml(review.revieweeUsername || '未知用户')}</p>
                                </div>
                            </div>
                            <div class="overall-score">
                                <div class="overall-score-label">综合得分</div>
                                <div class="overall-score-value">${review.rating}</div>
                                <div class="overall-score-stars">${renderStars(review.rating)}</div>
                            </div>
                        </div>

                        <div class="rating-dimensions">
                            <div class="dimension-item">
                                <span class="dimension-label">责任心</span>
                                <div class="dimension-rating">
                                    <span class="dimension-stars">${renderStars(review.responsibilityRating)}</span>
                                    <span class="dimension-value">${review.responsibilityRating}</span>
                                </div>
                            </div>
                            <div class="dimension-item">
                                <span class="dimension-label">沟通能力</span>
                                <div class="dimension-rating">
                                    <span class="dimension-stars">${renderStars(review.communicationRating)}</span>
                                    <span class="dimension-value">${review.communicationRating}</span>
                                </div>
                            </div>
                            <div class="dimension-item">
                                <span class="dimension-label">宠物状态反馈</span>
                                <div class="dimension-rating">
                                    <span class="dimension-stars">${renderStars(review.petConditionRating)}</span>
                                    <span class="dimension-value">${review.petConditionRating}</span>
                                </div>
                            </div>
                        </div>

                        ${contentHtml}

                        <div class="review-footer">
                            <div class="review-meta">
                                <span>寄养申请 #${review.requestId}</span>
                                <span>${review.createdAt || ''}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            document.getElementById('reviewsContainer').innerHTML = `<div class="reviews-list">${html}</div>`;
        }

        function renderPagination(data) {
            const paginationEl = document.getElementById('pagination');
            paginationEl.style.display = 'flex';

            const totalPages = data.totalPages;
            const currentPageNum = data.pageNumber + 1;

            let html = `
                <button onclick="goToPage(${data.pageNumber - 1})" ${data.first ? 'disabled' : ''}>上一页</button>
                <span class="page-info">第 ${currentPageNum} / ${totalPages} 页，共 ${totalReviews} 条</span>
                <button onclick="goToPage(${data.pageNumber + 1})" ${data.last ? 'disabled' : ''}>下一页</button>
            `;

            paginationEl.innerHTML = html;
        }

        function goToPage(page) {
            if (page < 0) return;
            currentPage = page;
            loadReviews();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
