<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据统计 - PetFoster</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 0;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        
        .header-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 {
            font-size: 28px;
        }
        
        .header .back-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            transition: background 0.3s;
        }
        
        .header .back-btn:hover {
            background: rgba(255,255,255,0.3);
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        
        .section-title {
            font-size: 22px;
            color: #333;
            margin-bottom: 20px;
            padding-left: 12px;
            border-left: 4px solid #667eea;
        }
        
        .overview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
        }
        
        .stat-card .label {
            color: #888;
            font-size: 14px;
            margin-bottom: 8px;
        }
        
        .stat-card .value {
            font-size: 32px;
            font-weight: 700;
            color: #333;
        }
        
        .stat-card .icon {
            font-size: 36px;
            margin-bottom: 12px;
        }
        
        .chart-section {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            margin-bottom: 30px;
        }
        
        .chart-section h3 {
            font-size: 18px;
            color: #333;
            margin-bottom: 20px;
        }
        
        .status-distribution {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }
        
        @media (max-width: 768px) {
            .status-distribution {
                grid-template-columns: 1fr;
            }
        }
        
        .distribution-item {
            margin-bottom: 12px;
        }
        
        .distribution-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-size: 14px;
            color: #555;
        }
        
        .distribution-bar {
            height: 8px;
            background: #e9ecef;
            border-radius: 4px;
            overflow: hidden;
        }
        
        .distribution-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.6s ease;
        }
        
        .breed-rank-item {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .breed-rank-item:last-child {
            border-bottom: none;
        }
        
        .rank-number {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #e9ecef;
            color: #666;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 14px;
            margin-right: 16px;
            flex-shrink: 0;
        }
        
        .rank-number.top-1 {
            background: linear-gradient(135deg, #ffd700, #ffb347);
            color: white;
        }
        
        .rank-number.top-2 {
            background: linear-gradient(135deg, #c0c0c0, #a8a8a8);
            color: white;
        }
        
        .rank-number.top-3 {
            background: linear-gradient(135deg, #cd7f32, #b87333);
            color: white;
        }
        
        .breed-info {
            flex: 1;
        }
        
        .breed-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }
        
        .breed-species {
            font-size: 12px;
            color: #999;
        }
        
        .breed-stats {
            text-align: right;
            flex-shrink: 0;
        }
        
        .breed-count {
            font-size: 18px;
            font-weight: 700;
            color: #667eea;
        }
        
        .breed-percentage {
            font-size: 12px;
            color: #999;
        }
        
        .breed-bar-container {
            margin-top: 6px;
            width: 100%;
        }
        
        .breed-bar {
            height: 6px;
            background: #e9ecef;
            border-radius: 3px;
            overflow: hidden;
        }
        
        .breed-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 3px;
            transition: width 0.6s ease;
        }
        
        .duration-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .duration-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
        }
        
        .duration-card .value {
            font-size: 28px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 6px;
        }
        
        .duration-card .unit {
            font-size: 14px;
            color: #888;
        }
        
        .duration-card .label {
            font-size: 13px;
            color: #666;
            margin-top: 8px;
        }
        
        .duration-by-category {
            margin-top: 20px;
        }
        
        .duration-by-category h4 {
            font-size: 15px;
            color: #555;
            margin-bottom: 12px;
        }
        
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .tab-btn {
            padding: 8px 20px;
            border: none;
            background: #f0f0f0;
            color: #666;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .tab-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .trend-chart {
            height: 200px;
            position: relative;
        }
        
        .trend-bars {
            display: flex;
            align-items: flex-end;
            height: 160px;
            gap: 4px;
            padding: 0 10px;
        }
        
        .trend-bar {
            flex: 1;
            background: linear-gradient(to top, #667eea, #764ba2);
            border-radius: 4px 4px 0 0;
            min-height: 2px;
            transition: height 0.5s ease;
            position: relative;
        }
        
        .trend-bar:hover {
            opacity: 0.8;
        }
        
        .trend-bar:hover::after {
            content: attr(data-count);
            position: absolute;
            top: -24px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            white-space: nowrap;
        }
        
        .trend-labels {
            display: flex;
            justify-content: space-between;
            padding: 8px 10px 0;
            font-size: 11px;
            color: #999;
        }
        
        .top-users-list {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .top-user-item {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .top-user-item:last-child {
            border-bottom: none;
        }
        
        .user-rank {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #667eea;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 13px;
            margin-right: 14px;
            flex-shrink: 0;
        }
        
        .user-info {
            flex: 1;
        }
        
        .username {
            font-weight: 600;
            color: #333;
        }
        
        .user-review-count {
            font-size: 12px;
            color: #999;
            margin-top: 2px;
        }
        
        .user-rating {
            text-align: right;
            flex-shrink: 0;
        }
        
        .rating-score {
            font-size: 18px;
            font-weight: 700;
            color: #f59e0b;
        }
        
        .rating-stars {
            font-size: 12px;
            color: #f59e0b;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        .loading::after {
            content: '...';
            animation: dots 1.5s steps(4, end) infinite;
        }
        
        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        .two-col-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }
        
        @media (max-width: 900px) {
            .two-col-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-inner">
            <h1>📊 数据统计</h1>
            <a href="index.html" class="back-btn">← 返回首页</a>
        </div>
    </div>
    
    <div class="container">
        <h2 class="section-title">平台总览</h2>
        <div id="overviewContainer" class="overview-grid">
            <div class="loading">加载中</div>
        </div>
        
        <div class="status-distribution">
            <div class="chart-section">
                <h3>📋 申请状态分布</h3>
                <div id="statusDistribution">
                    <div class="loading">加载中</div>
                </div>
            </div>
            <div class="chart-section">
                <h3>🐾 宠物种类分布</h3>
                <div id="speciesDistribution">
                    <div class="loading">加载中</div>
                </div>
            </div>
        </div>
        
        <h2 class="section-title">热门宠物品种排行</h2>
        <div class="chart-section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3 style="margin-bottom: 0;">🏆 热门品种 TOP 10</h3>
                <div style="font-size: 14px; color: #888;">
                    共 <span id="totalBreeds">0</span> 个品种 · <span id="totalBreedRequests">0</span> 次寄养
                </div>
            </div>
            <div id="breedRankList">
                <div class="loading">加载中</div>
            </div>
        </div>
        
        <h2 class="section-title">寄养时长统计</h2>
        <div class="chart-section">
            <h3>⏱️ 寄养时长分析</h3>
            <div id="durationStats">
                <div class="loading">加载中</div>
            </div>
        </div>
        
        <h2 class="section-title">数据趋势</h2>
        <div class="chart-section">
            <div class="tabs">
                <button class="tab-btn active" data-tab="requests">寄养申请</button>
                <button class="tab-btn" data-tab="completed">完成申请</button>
                <button class="tab-btn" data-tab="users">新增用户</button>
                <button class="tab-btn" data-tab="reviews">新增评价</button>
            </div>
            <div id="trendCharts">
                <div class="loading">加载中</div>
            </div>
        </div>
        
        <h2 class="section-title">优质用户排行</h2>
        <div class="chart-section">
            <h3>⭐ 评分最高的用户</h3>
            <div id="topUsers" class="top-users-list">
                <div class="loading">加载中</div>
            </div>
        </div>
    </div>
    
    <script src="js/common.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadOverviewStats();
            loadPopularBreeds();
            loadFosterDuration();
            loadTrendStats();
            
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    const tab = this.dataset.tab;
                    renderTrendChart(tab);
                });
            });
        });
        
        let trendData = null;
        
        async function loadOverviewStats() {
            try {
                const data = await apiRequest('/api/stats/overview');
                renderOverview(data);
                renderStatusDistribution(data.requestStatusCount);
                renderSpeciesDistribution(data.petSpeciesCount);
                renderTopUsers(data.topRatedUsers);
            } catch (error) {
                showMessage('加载总览数据失败: ' + error.message, 'error');
            }
        }
        
        function renderOverview(data) {
            const html = `
                <div class="stat-card">
                    <div class="icon">👥</div>
                    <div class="label">用户总数</div>
                    <div class="value">${data.totalUsers}</div>
                </div>
                <div class="stat-card">
                    <div class="icon">🐱</div>
                    <div class="label">宠物总数</div>
                    <div class="value">${data.totalPets}</div>
                </div>
                <div class="stat-card">
                    <div class="icon">📝</div>
                    <div class="label">寄养申请</div>
                    <div class="value">${data.totalRequests}</div>
                </div>
                <div class="stat-card">
                    <div class="icon">✅</div>
                    <div class="label">已完成</div>
                    <div class="value">${data.totalCompletedRequests}</div>
                </div>
                <div class="stat-card">
                    <div class="icon">⭐</div>
                    <div class="label">评价总数</div>
                    <div class="value">${data.totalReviews}</div>
                </div>
                <div class="stat-card">
                    <div class="icon">📅</div>
                    <div class="label">今日新增</div>
                    <div class="value">${data.todayNewRequests}</div>
                </div>
            `;
            document.getElementById('overviewContainer').innerHTML = html;
        }
        
        function renderStatusDistribution(statusCount) {
            const statusLabels = {
                'Pending': '待确认',
                'Approved': '已批准',
                'InProgress': '进行中',
                'Completed': '已完成',
                'Cancelled': '已取消'
            };
            const colors = {
                'Pending': '#f59e0b',
                'Approved': '#3b82f6',
                'InProgress': '#8b5cf6',
                'Completed': '#10b981',
                'Cancelled': '#ef4444'
            };
            
            const total = Object.values(statusCount).reduce((a, b) => a + b, 0);
            let html = '';
            
            for (const [status, count] of Object.entries(statusCount)) {
                const percentage = total > 0 ? ((count / total) * 100).toFixed(1) : 0;
                html += `
                    <div class="distribution-item">
                        <div class="distribution-label">
                            <span>${statusLabels[status] || status}</span>
                            <span>${count} (${percentage}%)</span>
                        </div>
                        <div class="distribution-bar">
                            <div class="distribution-fill" style="width: ${percentage}%; background: ${colors[status] || '#667eea'};"></div>
                        </div>
                    </div>
                `;
            }
            
            document.getElementById('statusDistribution').innerHTML = html;
        }
        
        function renderSpeciesDistribution(speciesCount) {
            const total = Object.values(speciesCount).reduce((a, b) => a + b, 0);
            const colors = ['#667eea', '#764ba2', '#f59e0b', '#10b981', '#ef4444', '#3b82f6'];
            let html = '';
            let colorIndex = 0;
            
            for (const [species, count] of Object.entries(speciesCount)) {
                const percentage = total > 0 ? ((count / total) * 100).toFixed(1) : 0;
                html += `
                    <div class="distribution-item">
                        <div class="distribution-label">
                            <span>${species}</span>
                            <span>${count} (${percentage}%)</span>
                        </div>
                        <div class="distribution-bar">
                            <div class="distribution-fill" style="width: ${percentage}%; background: ${colors[colorIndex % colors.length]};"></div>
                        </div>
                    </div>
                `;
                colorIndex++;
            }
            
            document.getElementById('speciesDistribution').innerHTML = html;
        }
        
        async function loadPopularBreeds() {
            try {
                const data = await apiRequest('/api/stats/popular-breeds?topN=10');
                renderPopularBreeds(data);
            } catch (error) {
                showMessage('加载热门品种数据失败: ' + error.message, 'error');
            }
        }
        
        function renderPopularBreeds(data) {
            document.getElementById('totalBreeds').textContent = data.totalBreeds;
            document.getElementById('totalBreedRequests').textContent = data.totalRequests;
            
            if (data.topBreeds.length === 0) {
                document.getElementById('breedRankList').innerHTML = '<div class="empty-state">暂无数据</div>';
                return;
            }
            
            const maxCount = Math.max(...data.topBreeds.map(b => b.requestCount));
            let html = '';
            
            data.topBreeds.forEach((breed, index) => {
                const rankClass = index < 3 ? `top-${index + 1}` : '';
                const barWidth = maxCount > 0 ? (breed.requestCount / maxCount * 100) : 0;
                
                html += `
                    <div class="breed-rank-item">
                        <div class="rank-number ${rankClass}">${index + 1}</div>
                        <div class="breed-info">
                            <div class="breed-name">${breed.breed}</div>
                            <div class="breed-species">${breed.species || '未知'}</div>
                            <div class="breed-bar-container">
                                <div class="breed-bar">
                                    <div class="breed-bar-fill" style="width: ${barWidth}%;"></div>
                                </div>
                            </div>
                        </div>
                        <div class="breed-stats">
                            <div class="breed-count">${breed.requestCount}</div>
                            <div class="breed-percentage">占 ${breed.percentage}%</div>
                        </div>
                    </div>
                `;
            });
            
            document.getElementById('breedRankList').innerHTML = html;
        }
        
        async function loadFosterDuration() {
            try {
                const data = await apiRequest('/api/stats/foster-duration');
                renderFosterDuration(data);
            } catch (error) {
                showMessage('加载寄养时长数据失败: ' + error.message, 'error');
            }
        }
        
        function renderFosterDuration(data) {
            if (data.totalCompletedRequests === 0) {
                document.getElementById('durationStats').innerHTML = '<div class="empty-state">暂无已完成的寄养申请</div>';
                return;
            }
            
            let speciesHtml = '';
            const speciesEntries = Object.entries(data.averageBySpecies || {});
            speciesEntries.sort((a, b) => b[1] - a[1]);
            const maxSpeciesAvg = speciesEntries.length > 0 ? Math.max(...speciesEntries.map(([, v]) => v)) : 1;
            
            speciesEntries.forEach(([species, avg]) => {
                const width = (avg / maxSpeciesAvg * 100).toFixed(1);
                speciesHtml += `
                    <div class="distribution-item">
                        <div class="distribution-label">
                            <span>${species}</span>
                            <span>${avg} 天</span>
                        </div>
                        <div class="distribution-bar">
                            <div class="distribution-fill" style="width: ${width}%; background: linear-gradient(90deg, #667eea, #764ba2);"></div>
                        </div>
                    </div>
                `;
            });
            
            let breedHtml = '';
            const breedEntries = Object.entries(data.averageByBreed || {});
            breedEntries.sort((a, b) => b[1] - a[1]);
            const topBreeds = breedEntries.slice(0, 5);
            const maxBreedAvg = topBreeds.length > 0 ? Math.max(...topBreeds.map(([, v]) => v)) : 1;
            
            topBreeds.forEach(([breed, avg]) => {
                const width = (avg / maxBreedAvg * 100).toFixed(1);
                breedHtml += `
                    <div class="distribution-item">
                        <div class="distribution-label">
                            <span>${breed}</span>
                            <span>${avg} 天</span>
                        </div>
                        <div class="distribution-bar">
                            <div class="distribution-fill" style="width: ${width}%; background: linear-gradient(90deg, #f59e0b, #ef4444);"></div>
                        </div>
                    </div>
                `;
            });
            
            const html = `
                <div class="duration-grid">
                    <div class="duration-card">
                        <div class="value">${data.averageDays}</div>
                        <div class="unit">天</div>
                        <div class="label">平均时长</div>
                    </div>
                    <div class="duration-card">
                        <div class="value">${data.medianDays}</div>
                        <div class="unit">天</div>
                        <div class="label">中位数</div>
                    </div>
                    <div class="duration-card">
                        <div class="value">${data.shortestDays}</div>
                        <div class="unit">天</div>
                        <div class="label">最短</div>
                    </div>
                    <div class="duration-card">
                        <div class="value">${data.longestDays}</div>
                        <div class="unit">天</div>
                        <div class="label">最长</div>
                    </div>
                    <div class="duration-card">
                        <div class="value">${data.totalCompletedRequests}</div>
                        <div class="unit">次</div>
                        <div class="label">已完成寄养</div>
                    </div>
                </div>
                
                <div class="two-col-grid">
                    <div class="duration-by-category">
                        <h4>按物种平均时长</h4>
                        ${speciesHtml || '<div class="empty-state" style="padding: 20px;">暂无数据</div>'}
                    </div>
                    <div class="duration-by-category">
                        <h4>按品种平均时长 TOP 5</h4>
                        ${breedHtml || '<div class="empty-state" style="padding: 20px;">暂无数据</div>'}
                    </div>
                </div>
            `;
            
            document.getElementById('durationStats').innerHTML = html;
        }
        
        async function loadTrendStats() {
            try {
                const data = await apiRequest('/api/stats/trend');
                trendData = data;
                renderTrendChart('requests');
            } catch (error) {
                showMessage('加载趋势数据失败: ' + error.message, 'error');
            }
        }
        
        function renderTrendChart(type) {
            if (!trendData) return;
            
            let dataList;
            switch (type) {
                case 'requests':
                    dataList = trendData.dailyRequests;
                    break;
                case 'completed':
                    dataList = trendData.dailyCompletedRequests;
                    break;
                case 'users':
                    dataList = trendData.dailyUsers;
                    break;
                case 'reviews':
                    dataList = trendData.dailyReviews;
                    break;
                default:
                    dataList = trendData.dailyRequests;
            }
            
            const maxCount = Math.max(...dataList.map(d => d.count), 1);
            const totalPoints = dataList.length;
            const step = Math.ceil(totalPoints / 7);
            
            let barsHtml = '';
            dataList.forEach(item => {
                const height = (item.count / maxCount * 100).toFixed(1);
                barsHtml += `<div class="trend-bar" style="height: ${height}%;" data-count="${item.count} 次"></div>`;
            });
            
            let labelsHtml = '';
            for (let i = 0; i < totalPoints; i += step) {
                const date = dataList[i].date.substring(5);
                labelsHtml += `<span>${date}</span>`;
            }
            
            const html = `
                <div class="trend-chart">
                    <div class="trend-bars">
                        ${barsHtml}
                    </div>
                    <div class="trend-labels">
                        ${labelsHtml}
                    </div>
                </div>
            `;
            
            document.getElementById('trendCharts').innerHTML = html;
        }
        
        function renderTopUsers(users) {
            if (users.length === 0) {
                document.getElementById('topUsers').innerHTML = '<div class="empty-state">暂无用户评价数据</div>';
                return;
            }
            
            let html = '';
            users.forEach((user, index) => {
                const fullStars = Math.floor(user.averageRating);
                const hasHalfStar = user.averageRating % 1 >= 0.5;
                let stars = '';
                for (let i = 0; i < fullStars; i++) stars += '★';
                if (hasHalfStar) stars += '☆';
                
                html += `
                    <div class="top-user-item">
                        <div class="user-rank">${index + 1}</div>
                        <div class="user-info">
                            <div class="username">${user.username}</div>
                            <div class="user-review-count">${user.reviewCount} 条评价</div>
                        </div>
                        <div class="user-rating">
                            <div class="rating-score">${user.averageRating}</div>
                            <div class="rating-stars">${stars}</div>
                        </div>
                    </div>
                `;
            });
            
            document.getElementById('topUsers').innerHTML = html;
        }
    </script>
</body>
</html>
