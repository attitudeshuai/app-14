server:
  port: 8084
  servlet:
    context-path: /

spring:
  application:
    name: petfoster

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:petfoster}?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: ${DB_USER:app_user}
    password: ${DB_PASSWORD:app_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

file:
  storage:
    upload-dir: uploads
    max-file-size: 5242880
    allowed-extensions: .jpg,.jpeg,.png,.gif,.webp

jwt:
  secret: ${JWT_SECRET:petfoster-super-secret-key-for-jwt-token-generation-123456-please-change-in-production}
  expiration: 86400000

foster:
  request:
    timeout-days: ${FOSTER_TIMEOUT_DAYS:7}
    timeout-cron: ${FOSTER_TIMEOUT_CRON:0 0 2 * * ?}
  return-reminder:
    days-before: ${FOSTER_RETURN_REMINDER_DAYS:2}
    cron: ${FOSTER_RETURN_REMINDER_CRON:0 0 9 * * ?}
  daily-log:
    reminder-cron: ${DAILY_LOG_REMINDER_CRON:0 0 20 * * ?}
    missed-days: ${DAILY_LOG_MISSED_DAYS:2}
    missed-reminder-cron: ${DAILY_LOG_MISSED_REMINDER_CRON:0 0 21 * * ?}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
